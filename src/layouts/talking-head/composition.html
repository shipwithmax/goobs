<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MaxShip — Talking Head Layout</title>
<style>
  :root {
    --brand: #E85D26;
    --bg: #0a0a0a;
    --fg: #f5f5f5;
  }
  body { margin: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, system-ui, sans-serif; }
  .stage { position: relative; width: 1920px; height: 1080px; overflow: hidden; }
  .speaker { position: absolute; inset: 0; }
  .speaker video { width: 100%; height: 100%; object-fit: cover; }
  .lower-third {
    position: absolute; left: 80px; bottom: 80px;
    background: var(--brand); color: white;
    padding: 1.25rem 2rem; font-size: 2.4rem; font-weight: 600;
    opacity: 0; transform: translateY(40px);
  }
  .lower-third small { display: block; font-size: 1.4rem; font-weight: 400; opacity: 0.9; margin-top: 0.25rem; }
</style>
</head>
<body>
<div class="stage">
  <div class="speaker">
    <!-- HyperFrames will inject the source.mp4 element here at render time -->
    <video src="../source.mp4" muted></video>
  </div>
  <div class="lower-third" id="lt-1">
    Max Palmer<small>Founder, MaxShip</small>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
  // HyperFrames convention: paused timelines on window.__timelines.
  // Cues from cues.json get injected here at enrich time.
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  tl.to('#lt-1', { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' }, 1);
  tl.to('#lt-1', { opacity: 0, y: -20, duration: 0.4, ease: 'power2.in' }, 6);
  window.__timelines.main = tl;
</script>
</body>
</html>
