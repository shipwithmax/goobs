<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MaxShip — Vertical Short Layout</title>
<style>
  :root {
    --brand: #E85D26;
    --bg: #0a0a0a;
    --fg: #f5f5f5;
  }
  body { margin: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, system-ui, sans-serif; }
  .stage { position: relative; width: 1080px; height: 1920px; overflow: hidden; }
  .speaker { position: absolute; inset: 0; }
  .speaker video { width: 100%; height: 100%; object-fit: cover; }

  /* Top band — title or hook */
  .top-band {
    position: absolute; top: 80px; left: 0; right: 0; padding: 0 60px;
    text-align: center;
    font-size: 4rem; font-weight: 800; line-height: 1.1;
    text-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  /* Caption track — burned-in word-level captions */
  .caption-track {
    position: absolute; left: 0; right: 0; bottom: 280px;
    text-align: center; padding: 0 60px;
    font-size: 4.5rem; font-weight: 800; line-height: 1.15;
    text-shadow: 0 3px 12px rgba(0,0,0,0.85);
  }
  .caption-track .highlight { color: var(--brand); }

  /* Bottom CTA */
  .cta {
    position: absolute; left: 0; right: 0; bottom: 120px;
    text-align: center;
    background: var(--brand); padding: 1.25rem;
    font-size: 2.2rem; font-weight: 700;
    margin: 0 80px; border-radius: 999px;
  }
  .slot { opacity: 0; transform: translateY(40px); }
</style>
</head>
<body>
<div class="stage">
  <div class="speaker">
    <video src="../source.mp4" muted></video>
  </div>
  <div class="top-band slot" id="hook">[HOOK]</div>
  <div class="caption-track" id="captions">
    <!-- Stage 5 (Render) injects word-level caption spans here -->
  </div>
  <div class="cta slot" id="cta">Follow for more</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script>
  window.__timelines = window.__timelines || {};
  const tl = gsap.timeline({ paused: true });
  tl.to('#hook', { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 0.2);
  tl.to('#cta',  { opacity: 1, y: 0, duration: 0.4, ease: 'power2.out' }, 1.0);
  window.__timelines.main = tl;
</script>
</body>
</html>
